<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GTEC E-Learning Portal — Login or Sign Up to access subject-wise notes, PDF viewer, and AI chatbot." />
  <title>GTEC LearnHub — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-page">
    <!-- Animated background -->
    <div class="login-bg">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card" id="loginCard">
      <div class="login-logo">
        <div class="logo-icon">📚</div>
        <h1>GTEC LearnHub</h1>
        <p>Your gateway to knowledge</p>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <div class="login-error" id="loginError">
        Invalid username or password. Please try again.
      </div>
      <div class="login-error" id="signupError" style="display:none;">
        Error creating account.
      </div>
      <div class="login-error" id="signupSuccess" style="display:none; background:rgba(74,222,128,0.1); border-color:rgba(74,222,128,0.3); color:#4ADE80;">
        Account created! You can now sign in.
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" placeholder="Enter your username" required />
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required />
            <span class="input-icon">🔒</span>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox" id="rememberMe" /> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">Sign In</button>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupForm" autocomplete="off" style="display:none;">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="signupName" placeholder="Enter your full name" required pattern="^[A-Za-z\s]+$" title="Only alphabets and spaces are allowed" />
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="form-group">
          <label for="signupUsername">Username</label>
          <div class="input-wrapper">
            <input type="text" id="signupUsername" placeholder="Choose a username" required />
            <span class="input-icon">✏️</span>
          </div>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <div class="input-wrapper">
            <input type="email" id="signupEmail" placeholder="Enter your email" required pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" title="Please enter a valid email address" />
            <span class="input-icon">📧</span>
          </div>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrapper">
            <input type="password" id="signupPassword" placeholder="Create a password (min 8 chars)" required minlength="8" />
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <!-- Role selector -->
        <div class="form-group">
          <label for="signupRole">I am a</label>
          <select id="signupRole" class="form-select" required>
            <option value="">Select your role</option>
            <option value="Student">Student (School)</option>
            <option value="College Student">College Student</option>
            <option value="Teacher">Teacher / Faculty</option>
            <option value="Administrator">Administrator</option>
          </select>
        </div>

        <!-- College-specific fields (hidden by default) -->
        <div id="collegeFields" style="display:none;">
          <div class="form-group">
            <label for="collegeName">College / University Name</label>
            <div class="input-wrapper">
              <input type="text" id="collegeName" placeholder="e.g. Anna University" />
              <span class="input-icon">🏫</span>
            </div>
          </div>

          <div class="form-group">
            <label for="collegeDegree">Degree</label>
            <select id="collegeDegree" class="form-select">
              <option value="">Select your degree</option>
              <option value="B.E.">B.E. (Bachelor of Engineering)</option>
              <option value="B.Tech">B.Tech (Bachelor of Technology)</option>
              <option value="B.Sc">B.Sc (Bachelor of Science)</option>
              <option value="B.Com">B.Com (Bachelor of Commerce)</option>
              <option value="B.A.">B.A. (Bachelor of Arts)</option>
              <option value="B.C.A.">B.C.A. (Bachelor of Computer Applications)</option>
              <option value="M.E.">M.E. (Master of Engineering)</option>
              <option value="M.Tech">M.Tech (Master of Technology)</option>
              <option value="M.Sc">M.Sc (Master of Science)</option>
              <option value="M.B.A.">M.B.A. (Master of Business Administration)</option>
              <option value="M.C.A.">M.C.A. (Master of Computer Applications)</option>
              <option value="Ph.D.">Ph.D. (Doctor of Philosophy)</option>
              <option value="Diploma">Diploma</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="collegeBranch">Branch / Specialization</label>
            <select id="collegeBranch" class="form-select">
              <option value="">Select your branch</option>
              <option value="CSE">Computer Science & Engineering (CSE)</option>
              <option value="IT">Information Technology (IT)</option>
              <option value="ECE">Electronics & Communication (ECE)</option>
              <option value="EEE">Electrical & Electronics (EEE)</option>
              <option value="MECH">Mechanical Engineering</option>
              <option value="CIVIL">Civil Engineering</option>
              <option value="AI&DS">AI & Data Science</option>
              <option value="AI&ML">AI & Machine Learning</option>
              <option value="CSBS">CS & Business Systems</option>
              <option value="BME">Biomedical Engineering</option>
              <option value="Chemistry">Chemistry</option>
              <option value="Physics">Physics</option>
              <option value="Mathematics">Mathematics</option>
              <option value="Commerce">Commerce</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group" style="flex:1;">
              <label for="collegeYear">Year</label>
              <select id="collegeYear" class="form-select">
                <option value="">Year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
                <option value="5">5th Year</option>
              </select>
            </div>
            <div class="form-group" style="flex:1;">
              <label for="collegeSemester">Semester</label>
              <select id="collegeSemester" class="form-select">
                <option value="">Semester</option>
                <option value="1">1st</option>
                <option value="2">2nd</option>
                <option value="3">3rd</option>
                <option value="4">4th</option>
                <option value="5">5th</option>
                <option value="6">6th</option>
                <option value="7">7th</option>
                <option value="8">8th</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnSignup">Create Account</button>
      </form>

      <div class="login-footer" id="loginFooter">
        Don't have an account? <a href="#" id="switchToSignup">Sign up</a>
      </div>
      <div class="login-footer" id="signupFooter" style="display:none;">
        Already have an account? <a href="#" id="switchToLogin">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    // ─── IndexedDB Setup ───
    const DB_NAME = 'GTECLearnHub';
    const DB_VERSION = 1;
    const STORE_NAME = 'users';

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'username' });
            store.createIndex('email', 'email', { unique: true });
          }
        };
      });
    }

    async function getUser(username) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.get(username);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    async function addUser(userData) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.add(userData);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    }

    async function initDefaultUsers() {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);

      const countReq = store.count();
      countReq.onsuccess = async () => {
        if (countReq.result === 0) {
          store.add({ username: 'admin', password: 'admin', name: 'Admin User', role: 'Administrator', email: 'admin@gtec.edu' });
          store.add({ username: 'student', password: 'student', name: 'Student User', role: 'Student', email: 'student@gtec.edu' });
        }
      };
    }

    // ─── DOM ───
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const loginError = document.getElementById('loginError');
    const signupError = document.getElementById('signupError');
    const signupSuccess = document.getElementById('signupSuccess');
    const passwordToggle = document.getElementById('passwordToggle');
    const passwordInput = document.getElementById('password');
    const authTabs = document.getElementById('authTabs');
    const collegeFields = document.getElementById('collegeFields');
    const signupRole = document.getElementById('signupRole');

    // Check if already logged in
    if (localStorage.getItem('gtec_auth')) {
      window.location.href = 'dashboard.html';
    }

    // Init DB
    initDefaultUsers();

    // ─── Tab Switching ───
    function showTab(tab) {
      loginError.classList.remove('show');
      signupError.style.display = 'none';
      signupSuccess.style.display = 'none';

      authTabs.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      authTabs.querySelector(`[data-tab="${tab}"]`).classList.add('active');

      if (tab === 'login') {
        loginForm.style.display = '';
        signupForm.style.display = 'none';
        document.getElementById('loginFooter').style.display = '';
        document.getElementById('signupFooter').style.display = 'none';
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = '';
        document.getElementById('loginFooter').style.display = 'none';
        document.getElementById('signupFooter').style.display = '';
      }
    }

    authTabs.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => showTab(tab.dataset.tab));
    });

    document.getElementById('switchToSignup').addEventListener('click', (e) => { e.preventDefault(); showTab('signup'); });
    document.getElementById('switchToLogin').addEventListener('click', (e) => { e.preventDefault(); showTab('login'); });

    // ─── Show/hide college fields ───
    signupRole.addEventListener('change', () => {
      collegeFields.style.display = signupRole.value === 'College Student' ? '' : 'none';
    });

    // ─── Password toggle ───
    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      passwordToggle.textContent = isPassword ? '🙈' : '👁';
    });

    // ─── Login ───
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const user = await getUser(username);
        if (user && user.password === password) {
          loginError.classList.remove('show');
          const authData = {
            username: user.username,
            name: user.name,
            role: user.role,
            email: user.email || '',
            college: user.college || '',
            degree: user.degree || '',
            branch: user.branch || '',
            year: user.year || '',
            semester: user.semester || '',
            loginTime: new Date().toISOString()
          };
          localStorage.setItem('gtec_auth', JSON.stringify(authData));

          const btn = document.getElementById('btnLogin');
          btn.textContent = '✓ Success!';
          btn.style.background = 'linear-gradient(135deg, #4ADE80, #22C55E)';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
        } else {
          loginError.textContent = 'Invalid username or password. Please try again.';
          loginError.classList.add('show');
        }
      } catch (err) {
        loginError.textContent = 'Error connecting to database.';
        loginError.classList.add('show');
      }
    });

    // ─── Signup ───
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      signupError.style.display = 'none';
      signupSuccess.style.display = 'none';

      const name = document.getElementById('signupName').value.trim();
      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const role = signupRole.value;

      if (!name || !username || !email || !password || !role) {
        signupError.textContent = 'Please fill in all required fields.';
        signupError.style.display = 'block';
        return;
      }

      const userData = { username, password, name, email, role };

      if (role === 'College Student') {
        userData.college = document.getElementById('collegeName').value.trim();
        userData.degree = document.getElementById('collegeDegree').value;
        userData.branch = document.getElementById('collegeBranch').value;
        userData.year = document.getElementById('collegeYear').value;
        userData.semester = document.getElementById('collegeSemester').value;
      }

      try {
        const existing = await getUser(username);
        if (existing) {
          signupError.textContent = 'Username already taken. Choose a different one.';
          signupError.style.display = 'block';
          return;
        }

        await addUser(userData);
        signupSuccess.textContent = '✓ Account created successfully! You can now sign in.';
        signupSuccess.style.display = 'block';
        signupForm.reset();
        collegeFields.style.display = 'none';

        setTimeout(() => showTab('login'), 1500);
      } catch (err) {
        signupError.textContent = 'Error creating account. Username or email may already be taken.';
        signupError.style.display = 'block';
      }
    });
  </script>
</body>
</html>
